<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0D0B08;color:#F0E8D5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(240,232,213,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(240,232,213,0.02) 1px,transparent 1px);background-size:80px 80px}

h1 em{font-style:italic;color:#D4882A}
p{font-size:0.9rem;color:#8A7A62;font-weight:300;margin-bottom:3rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;position:relative;z-index:1}

a:hover{background:#D4882A;color:#0D0B08}

</head>
